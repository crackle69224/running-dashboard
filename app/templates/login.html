<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — RunDash</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="brand" style="justify-content:center;margin-bottom:24px;">
        <span class="brand-mark">&#9651;</span>
        <span class="brand-name">RUN<span class="accent">DASH</span></span>
      </div>
      <h2>Log in</h2>
      <form id="loginForm">
        <label>Email</label>
        <input type="email" id="email" required autocomplete="email">
        <label>Password</label>
        <input type="password" id="password" required autocomplete="current-password">
        <button type="submit" class="btn-primary" style="width:100%;margin-top:8px;">Log in</button>
      </form>
      <div id="authError" class="auth-error"></div>
      <p class="auth-switch">No account? <a href="/signup">Sign up</a></p>
      <p class="auth-switch"><a href="/forgot-password">Forgot password?</a></p>
    </div>
  </div>
  <script src="/static/auth.js"></script>
  <script>setupAuthForm('loginForm', '/api/login');</script>
</body>
</html>
