<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set new password — RunDash</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="brand" style="justify-content:center;margin-bottom:24px;">
        <span class="brand-mark">&#9651;</span>
        <span class="brand-name">RUN<span class="accent">DASH</span></span>
      </div>
      <h2>Set a new password</h2>
      <form id="resetForm">
        <label>New password</label>
        <input type="password" id="password" required minlength="8" autocomplete="new-password">
        <div class="auth-hint">At least 8 characters.</div>
        <button type="submit" class="btn-primary" style="width:100%;margin-top:8px;">Update password</button>
      </form>
      <div id="authError" class="auth-error"></div>
      <p class="auth-switch"><a href="/login">Back to log in</a></p>
    </div>
  </div>
  <script>
    const token = {{ token | tojson }};
    const form = document.getElementById("resetForm");
    const errorBox = document.getElementById("authError");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.textContent = "";
      const password = document.getElementById("password").value;
      const submitBtn = form.querySelector("button[type=submit]");
      submitBtn.disabled = true;
      try {
        const res = await fetch("/api/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Something went wrong");
        errorBox.style.color = "var(--z3)";
        errorBox.textContent = data.message + " Redirecting to log in…";
        setTimeout(() => window.location.href = "/login", 1500);
      } catch (err) {
        errorBox.style.color = "var(--z5)";
        errorBox.textContent = err.message;
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
