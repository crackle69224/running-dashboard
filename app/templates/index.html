<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Running Dashboard</title>
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">&#9651;</span>
      <span class="brand-name">RUN<span class="accent">DASH</span></span>
    </div>
    <div class="upload-area">
      <input type="file" id="fitInput" accept=".fit,.zip" multiple hidden>
      <button id="uploadBtn" class="btn-primary">+ Upload FIT/ZIP Files</button>
      <span id="uploadStatus" class="upload-status"></span>
    </div>
    <div class="user-bar">
      <span>{{ user_email }}</span>
      {% if is_admin %}<span class="admin-badge">ADMIN</span>{% endif %}
      <button id="settingsBtn" class="btn-ghost">Settings</button>
      <button id="logoutBtn" class="btn-ghost">Log out</button>
    </div>
  </header>

  <main class="layout">
    <section class="summary-row" id="summaryRow"></section>

    <section class="trends-grid">
      <div class="card">
        <h3>Avg HR Trend <span class="unit">bpm</span></h3>
        <canvas id="avgHrChart" height="160"></canvas>
      </div>
      <div class="card">
        <h3>Zone 2 % Trend <span class="unit">% of time</span></h3>
        <canvas id="zone2Chart" height="160"></canvas>
      </div>
      <div class="card wide">
        <h3>Zone Distribution Across Runs</h3>
        <canvas id="zoneStackChart" height="140"></canvas>
      </div>
    </section>

    <section class="runs-header">
      <h2>Run History</h2>
    </section>
    <section class="runs-grid" id="runsGrid"></section>
  </main>

  <div id="runModal" class="modal hidden">
    <div class="modal-content">
      <button id="closeModal" class="modal-close">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <div id="settingsModal" class="modal hidden">
    <div class="modal-content" style="max-width:420px;">
      <button id="closeSettingsModal" class="modal-close">&times;</button>
      <h2 style="margin-top:0;">Settings</h2>
      <label style="font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;">Training model</label>
      <select id="settingsModelSelect" style="width:100%;margin-top:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--text);font-family:var(--sans);font-size:14px;">
        <option value="polarized">Polarized</option>
        <option value="pyramidal">Pyramidal</option>
        <option value="threshold">Threshold</option>
      </select>
      <button id="saveSettingsBtn" class="btn-primary" style="width:100%;margin-top:16px;">Save</button>
      <div id="settingsSaved" style="font-size:12px;color:var(--z3);margin-top:10px;height:14px;"></div>
    </div>
  </div>

  <script>
    window.MAX_HR = {{ max_hr }};
    window.ZONE_COLORS = {{ zone_colors | tojson }};
    window.IS_ADMIN = {{ is_admin | tojson }};
    window.TRAINING_MODEL = {{ training_model | tojson }};
  </script>
  <script src="/static/dashboard.js"></script>
</body>
</html>
