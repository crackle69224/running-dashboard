<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password — RunDash</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="brand" style="justify-content:center;margin-bottom:24px;">
        <span class="brand-mark">&#9651;</span>
        <span class="brand-name">RUN<span class="accent">DASH</span></span>
      </div>
      <h2>Reset your password</h2>
      <form id="forgotForm">
        <label>Email</label>
        <input type="email" id="email" required autocomplete="email">
        <button type="submit" class="btn-primary" style="width:100%;margin-top:8px;">Send reset link</button>
      </form>
      <div id="authError" class="auth-error"></div>
      <p class="auth-switch"><a href="/login">Back to log in</a></p>
    </div>
  </div>
  <script>
    const form = document.getElementById("forgotForm");
    const errorBox = document.getElementById("authError");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.textContent = "";
      const email = document.getElementById("email").value;
      const submitBtn = form.querySelector("button[type=submit]");
      submitBtn.disabled = true;
      try {
        const res = await fetch("/api/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();
        errorBox.style.color = "var(--z3)";
        errorBox.textContent = data.message;
      } catch (err) {
        errorBox.style.color = "var(--z5)";
        errorBox.textContent = "Something went wrong. Try again.";
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
