<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up — RunDash</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="brand" style="justify-content:center;margin-bottom:24px;">
        <span class="brand-mark">&#9651;</span>
        <span class="brand-name">RUN<span class="accent">DASH</span></span>
      </div>
      <h2>Create an account</h2>
      <form id="signupForm">
        <label>Email</label>
        <input type="email" id="email" required autocomplete="email">
        <label>Password</label>
        <input type="password" id="password" required autocomplete="new-password" minlength="8">
        <div class="auth-hint">At least 8 characters.</div>
        <button type="submit" class="btn-primary" style="width:100%;margin-top:8px;">Sign up</button>
      </form>
      <div id="authError" class="auth-error"></div>
      <p class="auth-switch">Already have an account? <a href="/login">Log in</a></p>
    </div>
  </div>
  <script src="/static/auth.js"></script>
  <script>setupAuthForm('signupForm', '/api/signup');</script>
</body>
</html>
